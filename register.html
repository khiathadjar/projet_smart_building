<!--#page register --> 
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title data-key="register_doc_title">Inscription – IntelliBuild</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

<header class="topbar">
  <h2>
    <div class="logo">
      <img class="brand-logo-lg" src="Sans%20titre-2.png" alt="IntelliBuild">
      <span data-key="brand">IntelliBuild</span>
    </div>
  </h2>
  <div class="right">
    <select class="lang">
      <option value="fr">FR</option>
      <option value="en">EN</option>
      <option value="ar">AR</option>
    </select>
    <a href="p1.html" class="btn outline" data-key="nav_home">Accueil</a>
  </div>
</header>

<section class="auth-container">
  <div class="auth-box">

    <h2 data-key="register_title">Créer un compte</h2>
    <p data-key="register_sub">Rejoignez la plateforme IntelliBuild</p>

    <form id="registerForm">

      <label data-key="label_email">Email</label>
      <input id="registerEmail" type="email" placeholder="exemple@mail.com" data-key="ph_email" data-attr="placeholder" required>

      <label data-key="label_password">Mot de passe</label>
      <input id="registerPassword" type="password" placeholder="••••••••" data-key="ph_password" data-attr="placeholder" required>

      <label data-key="label_confirm_password">Confirmer le mot de passe</label>
      <input id="registerConfirm" type="password" placeholder="••••••••" data-key="ph_confirm_password" data-attr="placeholder" required>

      <!-- bouton inscription -->
      <button type="submit" class="signup-btn" data-key="btn_signup">
        S’inscrire
      </button>

    </form>

    <script src="register.js"></script>

    <span class="auth-link" data-html="true" data-key="auth_link_login"></span>

  </div>
  
</section>

<footer class="site-footer">
  <div class="brand">
    <img src="Sans%20titre-2.png" alt="IntelliBuild">
    <span>IntelliBuild</span>
  </div>
  <div>(c) 2026 IntelliBuild. All rights reserved.</div>
</footer>

<script src="translations.js"></script>

</body>
</html>
