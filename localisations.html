<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>IntelliBuild - Architecture 3D Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: url('https://images.pexels.com/photos/4040649/pexels-photo-4040649.jpeg') no-repeat center center fixed;
            background-size: cover; 
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .glass-sidebar { background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(10px); }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        
        .floor-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 30px;
            overflow: hidden;
            border-left: 8px solid #10b981;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 550px; 
            margin-bottom: 2rem;
        }

        .canvas-container {
            flex-grow: 1;
            position: relative;
            cursor: grab;
            background: radial-gradient(circle, #ffffff 0%, #cbd5e1 100%);
        }
        .canvas-container:active { cursor: grabbing; }

        .room-tag {
            position: absolute;
            background: #1e293b;
            color: #f8fafc;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            transform: translate(-50%, -100%);
            white-space: nowrap;
            z-index: 10;
        }

        /* --- STYLES OVERLAY AJOUTÉS --- */
        .overlay-modal { position: fixed; inset: 0; display: grid; place-items: center; z-index: 1200; }
        .overlay-modal[hidden] { display: none; }
        .overlay-backdrop { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.66); backdrop-filter: blur(3px); }
        .overlay-panel {
            position: relative; width: min(900px, calc(100vw - 32px)); max-height: calc(100vh - 48px);
            overflow: auto; border-radius: 20px; padding: 20px; background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 24px 55px rgba(2, 6, 23, 0.35); border: 1px solid rgba(148, 163, 184, 0.25);
        }
        .overlay-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .overlay-title { margin: 0; font-size: 22px; color: #0f172a; }
        .overlay-close { border: none; width: 36px; height: 36px; border-radius: 999px; background: #e2e8f0; color: #0f172a; font-size: 18px; cursor: pointer; }
        .overlay-close:hover { background: #cbd5e1; }
        .role-chip { display: inline-block; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; color: #065f46; background: #d1fae5; }
        .role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 14px; }
        .role-item { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 12px; padding: 12px; }
        .role-item h4 { margin: 0 0 6px; font-size: 14px; color: #0f172a; }
        .role-item p { margin: 0; font-size: 13px; color: #334155; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 glass-sidebar min-h-screen text-gray-300 p-6 flex flex-col gap-6 shadow-2xl fixed z-50">
        <div class="text-2xl font-bold flex items-center gap-2 text-white">
            <img src="Sans%20titre-2.png" alt="IntelliBuild" class="h-10 w-10 rounded-full object-contain">
            <span>IntelliBuild</span>
        </div>
        
        <select class="lang w-full bg-gray-800 text-gray-200 rounded-lg p-2 text-sm border border-gray-700 focus:ring-2 focus:ring-emerald-500 outline-none">
             <option value="fr">Français</option>
             <option value="en">English</option>
             <option value="ar">العربية</option>
        </select>

        <nav class="flex flex-col gap-4 mt-10">
            <a href="index.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-home"></i> <span data-key="nav_dashboard">Dashboard</span>
            </a>
            
            <a href="ajouter-objet.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-plus"></i> <span data-key="nav_add">Ajouter</span>
            </a>

            <a href="objets.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-cube"></i> <span data-key="nav_objects">Objets</span>
            </a>

            <a href="localisations.html" class="bg-emerald-700 p-3 rounded-lg flex items-center gap-3 text-white shadow-lg">
                <i class="fas fa-map-marker-alt"></i> <span data-key="nav_locations">Localisations</span>
            </a>

            <a href="#" id="openHistoryOverlay" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-clock-rotate-left"></i> <span data-key="nav_history">Historique</span>
            </a>

            <a href="#" id="openRoleOverlay" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-user-shield"></i> <span data-key="nav_role">Role</span>
            </a>

            <a href="parametres.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition mt-auto">
                <i class="fas fa-cog"></i> <span data-key="nav_settings">Paramètres</span>
            </a>
        </nav>
    </aside>

    <div class="flex-1 ml-64">
        <header class="glass-header sticky top-0 z-40 px-8 py-4 flex justify-between items-center border-b border-gray-200">
            <div id="currentPos" class="bg-emerald-600 text-white px-5 py-2 rounded-full font-bold shadow-md">
                <i class="fas fa-street-view mr-2"></i> Ma Position : <span id="posName">Chargement...</span>
            </div>
        </header>

        <main class="p-8">
            <div class="mb-10">
                <h1 class="text-5xl font-black text-white mb-2 drop-shadow-lg">Architecture Interactive</h1>
                <p class="text-emerald-50 text-lg font-medium">Cliquez sur un bureau pour mettre à jour votre localisation.</p>
            </div>
            <div id="floorContainer" class="grid grid-cols-1 gap-12 max-w-6xl mx-auto"></div>
        </main>
    </div>

    <div class="overlay-modal" id="infoOverlay" hidden aria-hidden="true">
        <div class="overlay-backdrop" id="overlayBackdrop"></div>
        <div class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
            <div class="overlay-header">
                <h3 class="overlay-title" id="overlayTitle">Details</h3>
                <button class="overlay-close" id="overlayClose" type="button">x</button>
            </div>
            <div class="overlay-body" id="overlayBody"></div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script>
        // --- LOGIQUE OVERLAY (Historique & Role) ---
        const openHistoryOverlay = document.getElementById('openHistoryOverlay');
        const openRoleOverlay = document.getElementById('openRoleOverlay');
        const infoOverlay = document.getElementById('infoOverlay');
        const overlayBackdrop = document.getElementById('overlayBackdrop');
        const overlayClose = document.getElementById('overlayClose');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayBody = document.getElementById('overlayBody');

        function tr(key, fallback) {
            const locale = (localStorage.getItem('lang') || 'fr').toLowerCase();
            if (typeof translations !== 'undefined' && translations[locale] && translations[locale][key] !== undefined) {
                return translations[locale][key];
            }
            return fallback;
        }

        function openOverlay(title, htmlContent) {
            overlayTitle.textContent = title;
            overlayBody.innerHTML = htmlContent;
            infoOverlay.hidden = false;
            document.body.style.overflow = 'hidden';
        }

        function closeOverlay() {
            infoOverlay.hidden = true;
            document.body.style.overflow = '';
        }

        function buildHistoryOverlayHtml() {
            const raw = localStorage.getItem('adminHistory');
            const history = raw ? JSON.parse(raw) : [];
            const rows = history.map(item => `
                <tr>
                    <td class="p-3 text-sm text-slate-600">${item.date || '-'}</td>
                    <td class="p-3 text-sm font-semibold text-slate-700">${item.action || '-'}</td>
                    <td class="p-3 text-sm">${item.detail || '-'}</td>
                    <td class="p-3 text-sm"><span class="px-3 py-1 rounded-full text-xs font-bold ${item.status === 'Succes' ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-700'}">${item.status || '-'}</span></td>
                </tr>`).join('');
            return `<div class="p-2"><h3 class="text-xl font-bold mb-4">${tr('history_overlay_title', 'Historique')}</h3><table class="w-full text-left"><tbody class="divide-y">${rows}</tbody></table></div>`;
        }

        function buildRoleOverlayHtml() {
            return `<div class="p-2"><h3 class="text-xl font-bold mb-4">${tr('role_overlay_title', 'Role')}</h3><span class="role-chip">Admin</span><div class="role-grid"><div class="role-item"><h4>Gestion</h4><p>Accès complet.</p></div></div></div>`;
        }

        openHistoryOverlay.addEventListener('click', (e) => { e.preventDefault(); openOverlay(tr('history_overlay_title', 'Historique'), buildHistoryOverlayHtml()); });
        openRoleOverlay.addEventListener('click', (e) => { e.preventDefault(); openOverlay(tr('role_overlay_title', 'Role'), buildRoleOverlayHtml()); });
        overlayBackdrop.addEventListener('click', closeOverlay);
        overlayClose.addEventListener('click', closeOverlay);

        // --- TA LOGIQUE THREE.JS ORIGINALE ---
        const ARCHI_DATA = [
            { id: 4, name: "Étage 4 - Direction", color: 0xef4444, rooms: ["Bureau PDG", "Salle Conseil", "Salon VIP", "Terrasse", "Secrétariat", "Archives Dir."] },
            { id: 3, name: "Étage 3 - Tech", color: 0x3b82f6, rooms: ["Open Space", "Labo Robotique", "Bureau Lead", "Réunion 3A", "Debug Zone", "Serveurs 3"] },
            { id: 2, name: "Étage 2 - Marketing", color: 0xa855f7, rooms: ["Studio Graph.", "Bureau RH", "Compta", "Presse", "Réunion 2B", "Bureau Com"] },
            { id: 1, name: "Étage 1 - Logistique", color: 0xf59e0b, rooms: ["Stockage", "Atelier", "Serveurs 1", "Sécurité", "Quai", "Bureau Chef"] },
            { id: 0, name: "RDC - Public", color: 0x10b981, rooms: ["Accueil", "Cafétéria", "Showroom", "Auditorium", "Sanitaires", "Détente"] }
        ];

        function setMyPos(room) {
            localStorage.setItem('user_room', room);
            document.getElementById('posName').textContent = room;
            alert("📍 Localisation mise à jour : " + room);
            location.reload();
        }

        function createFloor3D(containerId, rooms, floorColor) {
            const container = document.getElementById(containerId);
            const width = container.clientWidth;
            const height = container.clientHeight;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(40, width / height, 1, 1000);
            camera.position.set(30, 25, 30);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.6);
            light.position.set(10, 20, 10);
            scene.add(light);

            const clickableObjects = [];
            const labels = [];

            rooms.forEach((roomName, index) => {
                const group = new THREE.Group();
                const geometry = new THREE.BoxGeometry(8, 4, 8);
                const material = new THREE.MeshPhongMaterial({ color: floorColor, transparent: true, opacity: 0.7 });
                const cube = new THREE.Mesh(geometry, material);
                
                const posX = (index % 3) * 12 - 12;
                const posZ = Math.floor(index / 3) * 12 - 6;
                group.position.set(posX, 0, posZ);

                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.3 }));
                
                group.add(cube);
                group.add(line);
                group.userData = { name: roomName };
                
                scene.add(group);
                clickableObjects.push(cube);

                const label = document.createElement('div');
                label.className = 'room-tag';
                label.textContent = roomName;
                container.appendChild(label);
                labels.push({ element: label, position: group.position });
            });

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            renderer.domElement.addEventListener('click', (event) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / width) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / height) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(clickableObjects);

                if (intersects.length > 0) {
                    const roomName = intersects[0].object.parent.userData.name;
                    setMyPos(roomName);
                }
            });

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                labels.forEach(l => {
                    const vector = l.position.clone();
                    vector.project(camera);
                    l.element.style.left = `${(vector.x * 0.5 + 0.5) * width}px`;
                    l.element.style.top = `${(vector.y * -0.5 + 0.5) * height}px`;
                    l.element.style.display = vector.z > 1 ? "none" : "block";
                });
                renderer.render(scene, camera);
            }
            animate();
        }

        function init() {
            const container = document.getElementById('floorContainer');
            container.innerHTML = ARCHI_DATA.map(floor => `
                <div class="floor-card">
                    <div class="px-8 py-6 flex justify-between items-center bg-white border-b">
                        <h2 class="text-3xl font-black text-gray-900 uppercase italic"><i class="fas fa-layer-group mr-2 text-emerald-500"></i> ${floor.name}</h2>
                        <span class="text-xs font-bold text-gray-400">6 UNITÉS DISPONIBLES</span>
                    </div>
                    <div id="canvas-${floor.id}" class="canvas-container"></div>
                </div>
            `).join('');

            ARCHI_DATA.forEach(floor => createFloor3D(`canvas-${floor.id}`, floor.rooms, floor.color));
            document.getElementById('posName').textContent = localStorage.getItem('user_room') || "Non définie";
        }
        window.onload = init;
    </script>
</body>
</html>
