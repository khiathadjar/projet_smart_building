<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-key="notifications_admin_doc_title">Notifications Admin - IntelliBuild</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --bg-1: #0b1220;
      --bg-2: #1e293b;
      --sidebar-bg: rgba(0, 0, 0, 0.92);
      --menu-link: #d1d5db;
      --menu-hover-bg: #1f2937;
      --menu-active-bg: #047857;
      --menu-active-ring: rgba(16, 185, 129, 0.45);
      --panel: rgba(255, 255, 255, 0.96);
      --text: #0f172a;
      --muted: #64748b;
      --ok: #166534;
      --ok-bg: #dcfce7;
      --warn: #92400e;
      --warn-bg: #fef3c7;
      --info: #0c4a6e;
      --info-bg: #e0f2fe;
      --danger: #be123c;
      --danger-bg: #ffe4e6;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background: url('https://images.pexels.com/photos/4040649/pexels-photo-4040649.jpeg') no-repeat center center fixed;
      background-size: cover;
      padding: 0;
      display: flex;
    }

    .admin-sidebar {
      width: 280px;
      flex: 0 0 280px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(4px);
      color: var(--menu-link);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 100vh;
      z-index: 50;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .sidebar-logo {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-logo img {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      object-fit: contain;
    }

    .sidebar-lang {
      width: 100%;
      background: #1f2937;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #374151;
      outline: none;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 12px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      margin: 4px 0;
      border-radius: 10px;
      color: var(--menu-link);
      text-decoration: none;
      transition: background 0.25s ease, color 0.25s ease;
      font-weight: 600;
    }

    .sidebar-nav a i {
      width: 18px;
      text-align: center;
      flex: 0 0 18px;
    }

    .sidebar-nav a:hover { background: var(--menu-hover-bg); color: #fff; }

    .sidebar-nav .active {
      background: var(--menu-active-bg);
      color: #fff;
      box-shadow: inset 0 0 0 1px var(--menu-active-ring);
    }

    .sidebar-nav .settings-link {
      margin-top: auto;
    }

    .content-area {
      margin-left: 0;
      width: 100%;
      padding: 24px;
      flex: 1;
    }

    .wrap {
      width: min(1050px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.35);
      overflow: hidden;
    }

    .head {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      padding: 18px 20px;
      border-bottom: 1px solid #e2e8f0;
      background: linear-gradient(135deg, #f8fafc, #eef2ff);
    }

    .title { margin: 0; font-size: 22px; }
    .sub { margin: 6px 0 0; color: var(--muted); font-size: 13px; }

    .actions { display: flex; gap: 8px; align-items: center; }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-primary { background: #0f766e; color: #fff; }
    .btn-light { background: #e2e8f0; color: #0f172a; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      border-bottom: 1px solid #e2e8f0;
    }

    .unread {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .badge {
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }

    .notif-list { display: grid; gap: 10px; padding: 14px; }

    .notif {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 8px;
    }

    .notif.unread-item { border-color: #0ea5a4; box-shadow: 0 0 0 1px rgba(20, 184, 166, 0.2); }

    .row-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .row-top h4 { margin: 0; font-size: 15px; }
    .meta { color: var(--muted); font-size: 12px; }

    .type-info { background: var(--info-bg); color: var(--info); }
    .type-success { background: var(--ok-bg); color: var(--ok); }
    .type-warning { background: var(--warn-bg); color: var(--warn); }
    .type-error { background: var(--danger-bg); color: var(--danger); }

    .history-panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    .history-panel h3 {
      margin: 0 0 12px;
      font-size: 28px;
      color: #0f172a;
      font-weight: 800;
    }

    .history-table-wrap {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    .history-table thead th {
      text-align: left;
      padding: 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
      border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .history-table tbody td {
      padding: 12px;
      font-size: 15px;
      color: #334155;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }

    .history-table tbody tr:last-child td {
      border-bottom: none;
    }

    .history-date {
      white-space: nowrap;
      color: #475569;
      font-size: 14px;
    }

    .history-action {
      font-weight: 700;
      color: #334155;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .status-pill-ok {
      background: #dcfce7;
      color: #166534;
    }

    .status-pill-ko {
      background: #ffe4e6;
      color: #be123c;
    }

    .history-empty {
      color: #64748b;
      font-size: 14px;
      text-align: center;
      padding: 18px;
    }

    .empty { padding: 26px; text-align: center; color: var(--muted); }

    .overlay-modal { position: fixed; inset: 0; display: grid; place-items: center; z-index: 1200; }
    .overlay-modal[hidden] { display: none; }
    .overlay-backdrop { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.66); backdrop-filter: blur(3px); }
    .overlay-panel {
      position: relative;
      width: min(900px, calc(100vw - 32px));
      max-height: calc(100vh - 48px);
      overflow: auto;
      border-radius: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 24px 55px rgba(2, 6, 23, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.25);
    }
    .overlay-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .overlay-title { margin: 0; font-size: 22px; color: #0f172a; }
    .overlay-close { border: none; width: 36px; height: 36px; border-radius: 999px; background: #e2e8f0; color: #0f172a; font-size: 18px; cursor: pointer; }
    .overlay-close:hover { background: #cbd5e1; }
    .role-chip { display: inline-block; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; color: #065f46; background: #d1fae5; }
    .role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 14px; }
    .role-item { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 12px; padding: 12px; }
    .role-item h4 { margin: 0 0 6px; font-size: 14px; color: #0f172a; }
    .role-item p { margin: 0; font-size: 13px; color: #334155; }

    @media (max-width: 740px) {
      body { display: block; }
      .admin-sidebar { position: static; width: 100%; min-height: auto; }
      .content-area { margin-left: 0; width: 100%; padding: 12px; }
      .head, .toolbar { padding: 12px; }
      .actions { width: 100%; }
      .btn { flex: 1; }
    }
  </style>
  <link rel="stylesheet" href="theme.css">
  <script data-theme-role-script>
    (function () {
      var path = (window.location.pathname.split('/').pop() || '').toLowerCase();
      var page = path.replace('.html', '') || 'home';
      document.documentElement.setAttribute('data-page', page);

      var role = (localStorage.getItem('userRole') || '').toLowerCase();
      if (!role) {
        if (page.indexOf('admin') >= 0 || ['index','ajouter-objet','objets','localisations','parametres'].indexOf(page) >= 0) {
          role = 'admin';
        } else if (page.indexOf('user') >= 0 || ['user','mesobjet','localisations-user','parametres-user'].indexOf(page) >= 0) {
          role = 'user';
        } else {
          role = 'guest';
        }
      }
      document.documentElement.setAttribute('data-role', role);
    })();
  </script></head>
<body>
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="intellibuild-mark.svg" alt="IntelliBuild">
      <span data-key="brand">IntelliBuild</span>
    </div>

    <select class="sidebar-lang" id="langSelect">
      <option value="fr">FR</option>
      <option value="en">EN</option>
      <option value="ar">AR</option>
    </select>

    <nav class="sidebar-nav">
      <a href="index.html"><i class="fas fa-home"></i><span data-key="nav_dashboard">Dashboard</span></a>
      <a href="ajouter-objet.html"><i class="fas fa-plus"></i><span data-key="nav_add">Ajouter</span></a>
      <a href="objets.html"><i class="fas fa-cube"></i><span data-key="nav_objects">Objets</span></a>
      <a href="localisations.html"><i class="fas fa-map-marker-alt"></i><span data-key="nav_locations">Localisations</span></a>
      <a href="#" id="openHistoryOverlay"><i class="fas fa-clock-rotate-left"></i><span data-key="nav_history">Historique</span></a>
      <a href="#" id="openAdminReportsOverlay"><i class="fas fa-flag"></i><span>Signalements</span></a>
      <a href="notifications-admin.html" class="active"><i class="fas fa-bell"></i><span data-key="nav_notifications">Notifications</span></a>
      <a href="documatation.html"><i class="fas fa-book-open"></i><span data-key="nav_documentation">Documentation</span></a>
      <a href="parametres.html" class="settings-link"><i class="fas fa-cog"></i><span data-key="nav_settings">Paramètres</span></a>
    </nav>
  </aside>

  <div class="content-area">
    <main class="wrap">
    <header class="head">
      <div>
        <h1 class="title" data-key="notifications_admin_title">Notifications Admin</h1>
        <p class="sub" data-key="notifications_admin_sub">Canal reserve aux actions et alertes d'administration.</p>
      </div>
      <div class="actions">
        <button class="btn btn-light" id="refreshBtn" type="button" data-key="btn_refresh">Rafraichir</button>
        <button class="btn btn-primary" id="markAllBtn" type="button" data-key="btn_mark_all_read">Tout marquer lu</button>
        <button class="btn btn-light" type="button" onclick="window.location.href='index.html'" data-key="btn_back_dashboard">Retour dashboard</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="unread">
        <span data-key="unread_label">Non lues:</span>
        <span class="badge type-info" id="unreadCount">0</span>
      </div>
    </div>

    <section id="notifList" class="notif-list"></section>
    <div id="emptyState" class="empty" hidden data-key="notifications_admin_empty">Aucune notification admin pour le moment.</div>
    </main>
  </div>

  <div class="overlay-modal" id="infoOverlay" hidden aria-hidden="true">
    <div class="overlay-backdrop" id="overlayBackdrop"></div>
    <div class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
      <div class="overlay-header">
        <h3 class="overlay-title" id="overlayTitle" data-key="detail_overlay_title">Details</h3>
        <button class="overlay-close" id="overlayClose" type="button" aria-label="Fermer">x</button>
      </div>
      <div class="overlay-body" id="overlayBody"></div>
    </div>
  </div>

  <script src="translations.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG.API_BASE;
    const token = localStorage.getItem("userToken");
    const role = localStorage.getItem("userRole");

    const notifList = document.getElementById("notifList");
    const emptyState = document.getElementById("emptyState");
    const unreadCount = document.getElementById("unreadCount");
    const refreshBtn = document.getElementById("refreshBtn");
    const markAllBtn = document.getElementById("markAllBtn");
    const openHistoryOverlay = document.getElementById("openHistoryOverlay");
    const infoOverlay = document.getElementById("infoOverlay");
    const overlayBackdrop = document.getElementById("overlayBackdrop");
    const overlayClose = document.getElementById("overlayClose");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayBody = document.getElementById("overlayBody");
    let adminNotificationsReady = false;

    if (!token) window.location.href = "login.html";
    if (role !== "admin") window.location.href = "user.html";

    function tr(key, fallback, params) {
      if (window.getTranslationText) return window.getTranslationText(key, fallback, params);
      return fallback;
    }

    function getCurrentLocale() {
      const lang = String(localStorage.getItem("lang") || "fr").toLowerCase();
      if (lang === "ar") return "ar";
      if (lang === "en") return "en-US";
      return "fr-FR";
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      };
    }

    function formatDate(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString(getCurrentLocale());
    }

    function typeClass(type) {
      const t = String(type || "info").toLowerCase();
      if (t === "success") return "type-success";
      if (t === "warning") return "type-warning";
      if (t === "error") return "type-error";
      return "type-info";
    }

    function openOverlay(title, htmlContent) {
      overlayTitle.textContent = title;
      overlayBody.innerHTML = htmlContent;
      infoOverlay.hidden = false;
      document.body.style.overflow = "hidden";
    }

    function closeOverlay() {
      infoOverlay.hidden = true;
      document.body.style.overflow = "";
    }

    function normalizeAdminActionLabel(action) {
      const raw = String(action || "").trim();
      if (!raw) return tr("admin_action_default", "Admin - Action");
      if (raw === "Utilisateurs") return tr("admin_action_users", "Admin - Gestion utilisateurs");
      if (raw === "Session") return tr("admin_action_session", "Admin - Session");
      if (raw === "Profil") return tr("admin_action_profile", "Admin - Profil");
      if (raw === "Navigation") return tr("admin_action_navigation", "Admin - Navigation");
      if (raw.startsWith("Admin -")) return raw;
      return `${tr("role_admin_chip", "Admin")} - ${raw}`;
    }

    function renderHistoryTable(history) {
      const rows = history.map(function (item) {
        const success = String(item.status || "").toLowerCase().includes("succes");
        return `
          <tr>
            <td class="history-date">${item.date || "-"}</td>
            <td class="history-action">${normalizeAdminActionLabel(item.action)}</td>
            <td>${item.detail || "-"}</td>
            <td><span class="status-pill ${success ? "status-pill-ok" : "status-pill-ko"}">${item.status || "-"}</span></td>
          </tr>`;
      }).join("");

      const empty = history.length ? "" : `<tr><td colspan="4" class="history-empty">${tr("history_empty_admin", "Aucun historique pour le moment.")}</td></tr>`;
      return `
        <div class="history-panel">
          <h3>${tr("history_admin_title", "Historique admin")}</h3>
          <div class="history-table-wrap">
            <table class="history-table">
              <thead>
                <tr>
                  <th>${tr("history_date", "Date")}</th>
                  <th>${tr("history_action", "Action")}</th>
                  <th>${tr("history_detail", "Detail")}</th>
                  <th>${tr("history_status", "Statut")}</th>
                </tr>
              </thead>
              <tbody>${rows || empty}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    async function fetchAdminHistory() {
      const res = await fetch(`${API_BASE}/user/history`, { headers: authHeaders() });
      const data = await res.json().catch(() => []);
      const list = Array.isArray(data) ? data : [];
      return list.filter(function (entry) {
        const action = String(entry && entry.action ? entry.action : "").trim().toLowerCase();
        return action.includes("admin") || ["utilisateurs", "session", "profil", "navigation"].includes(action);
      });
    }

    async function openHistoryOverlayView() {
      openOverlay(tr("history_admin_title", "Historique admin"), `<div class="history-panel">${tr("history_loading", "Chargement...")}</div>`);
      try {
        const history = await fetchAdminHistory();
        overlayBody.innerHTML = renderHistoryTable(history);
      } catch (error) {
        console.error("Erreur historique admin:", error);
        overlayBody.innerHTML = `<div class="history-panel" style="color:#be123c;">${tr("notif_history_error", "Impossible de charger l'historique.")}</div>`;
      }
    }

    openHistoryOverlay.addEventListener("click", function (event) {
      event.preventDefault();
      openHistoryOverlayView();
    });

    function buildRoleOverlayHtml() {
      return `<div class="p-2"><h3 class="text-xl font-bold mb-4">${tr("nav_role", "Role")}</h3><span class="role-chip">${tr("role_admin_chip", "Admin")}</span><div class="role-grid"><div class="role-item"><h4>${tr("role_admin_manage_title", "Gestion")}</h4><p>${tr("role_admin_manage_text", "Acces complet.")}</p></div></div></div>`;
    }

    async function loadCount() {
      try {
        const res = await fetch(`${API_BASE}/notifications/count`, { headers: authHeaders() });
        const data = await res.json().catch(() => ({}));
        unreadCount.textContent = String(data.unread || 0);
      } catch {
        unreadCount.textContent = "0";
      }
    }

    async function markOneAsRead(id) {
      try {
        await fetch(`${API_BASE}/notifications/${encodeURIComponent(id)}/read`, {
          method: "PATCH",
          headers: authHeaders(),
          body: JSON.stringify({ is_read: true })
        });
        await loadNotifications();
      } catch (error) {
        console.error("Erreur mark read:", error);
      }
    }

    async function loadNotifications() {
      try {
        const res = await fetch(`${API_BASE}/notifications/me?limit=100`, { headers: authHeaders() });
        const data = await res.json().catch(() => []);
        const list = Array.isArray(data) ? data : [];

        notifList.innerHTML = list.map((n) => `
          <article class="notif ${n.is_read ? "" : "unread-item"}">
            <div class="row-top">
              <h4>${(n.title || tr("notification_default_title", "Notification")).replace(/</g, "&lt;")}</h4>
              <span class="badge ${typeClass(n.type)}">${String(n.type || "info")}</span>
            </div>
            <div>${String(n.message || "").replace(/</g, "&lt;")}</div>
            <div class="meta">${formatDate(n.created_at)}${n.actor_email ? ` - ${n.actor_email}` : ""}</div>
            <div>
              ${n.is_read ? "" : `<button class="btn btn-light" type="button" onclick="markOneAsRead('${n.id}')">${tr("btn_mark_read", "Marquer lu")}</button>`}
            </div>
          </article>
        `).join("");

        emptyState.hidden = list.length > 0;
        await loadCount();
      } catch (error) {
        console.error("Erreur notifications:", error);
        notifList.innerHTML = "";
        emptyState.hidden = false;
      }
    }

    async function markAllAsRead() {
      try {
        const res = await fetch(`${API_BASE}/notifications/read-all`, {
          method: "PATCH",
          headers: authHeaders()
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.detail || tr("notif_mark_all_error", "Impossible de marquer les notifications."));
          return;
        }
        await loadNotifications();
      } catch (error) {
        console.error("Erreur mark all:", error);
      }
    }

    refreshBtn.addEventListener("click", loadNotifications);
    markAllBtn.addEventListener("click", markAllAsRead);
    overlayBackdrop.addEventListener("click", closeOverlay);
    overlayClose.addEventListener("click", closeOverlay);

    window.markOneAsRead = markOneAsRead;
    window.addEventListener("app:languagechange", function () {
      if (!adminNotificationsReady) return;
      loadNotifications();
    });
    loadNotifications().finally(function () {
      adminNotificationsReady = true;
    });
  </script>
  <script src="sidebar-overlay-active.js"></script>
  <script src="admin-reports.js"></script>
</body>
</html>
