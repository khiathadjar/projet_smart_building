<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLocate - Consultation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-emerald-700">SmartLocate <span class="text-gray-400">| Consultation</span></h1>
            <button onclick="logout()" class="text-sm text-red-600 hover:underline">Déconnexion</button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="mainSearch" placeholder="Rechercher un objet..." 
                       class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-3 text-sm font-semibold text-gray-600">Nom de l'objet</th>
                        <th class="p-3 text-sm font-semibold text-gray-600">Type</th>
                        <th class="p-3 text-sm font-semibold text-gray-600">Localisation</th>
                        <th class="p-3 text-sm font-semibold text-gray-600">Statut</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const apiBase = 'http://127.0.0.1:8000';

        async function chargerObjets(query = "") {
            try {
                const response = await fetch(`${apiBase}/things/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ search_query: query })
                });

                const items = await response.json();
                const tbody = document.getElementById('tableBody');

                tbody.innerHTML = items.map(item => `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-3 font-medium text-gray-800">
                            <i class="fas fa-cube text-emerald-600 mr-2"></i> ${item.name || 'Sans nom'}
                        </td>
                        <td class="p-3 text-sm text-gray-600">${item.type || 'Inconnu'}</td>
                        <td class="p-3 text-sm text-gray-600">${item.location?.room || item.location || 'N/A'}</td>
                        <td class="p-3">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${item.status === 'active' || item.status === 'Disponible' ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-700'}">
                                ● ${item.status || 'inconnu'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Erreur de chargement:", error);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        // Recherche en temps réel
        document.getElementById('mainSearch').addEventListener('input', (e) => chargerObjets(e.target.value));

        // Charger au démarrage
        window.onload = () => chargerObjets("");
    </script>
</body>
</html>
