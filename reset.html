<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reinitialiser le mot de passe – IntelliBuild</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

<header class="topbar">
  <h2>
    <div class="logo">
      <img class="brand-logo-lg" src="Sans%20titre-2.png" alt="IntelliBuild">
      <span>IntelliBuild</span>
    </div>
  </h2>
  <a href="login.html" class="btn outline">Connexion</a>
</header>

<section class="auth-container">
  <div class="auth-box">
    <h2>Reinitialiser le mot de passe</h2>
    <p>Choisis un nouveau mot de passe.</p>

    <form id="resetForm">
      <label>Nouveau mot de passe</label>
      <input id="newPassword" type="password" placeholder="••••••••" required>

      <label>Confirmer le mot de passe</label>
      <input id="confirmPassword" type="password" placeholder="••••••••" required>

      <button type="submit" class="login-btn">Mettre a jour</button>
    </form>
  </div>
</section>

<footer class="site-footer">
  <div class="brand">
    <img src="Sans%20titre-2.png" alt="IntelliBuild">
    <span>IntelliBuild</span>
  </div>
  <div>(c) 2026 IntelliBuild. All rights reserved.</div>
</footer>

<script>
  const SUPABASE_URL = "https://jmxctdcosdckpbufocwc.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_mqd59UHa-nfnHa6ZBs0dvQ_lL5vp2WK";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function getHashParams() {
    const hash = window.location.hash.substring(1);
    return Object.fromEntries(new URLSearchParams(hash));
  }

  async function initSessionFromHash() {
    const params = getHashParams();
    if (!params.access_token) return false;
    await client.auth.setSession({
      access_token: params.access_token,
      refresh_token: params.refresh_token
    });
    return true;
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (pass !== confirm) {
      alert('Les mots de passe ne correspondent pas.');
      return;
    }

    const hasSession = await initSessionFromHash();
    if (!hasSession) {
      alert('Lien invalide ou expire.');
      return;
    }

    const { error } = await client.auth.updateUser({ password: pass });
    if (error) {
      alert(error.message || 'Erreur lors de la mise a jour.');
      return;
    }

    alert('Mot de passe mis a jour. Tu peux te connecter.');
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
