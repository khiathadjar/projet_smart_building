<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBuild - Paramètres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: url('https://images.pexels.com/photos/4040649/pexels-photo-4040649.jpeg') no-repeat center center fixed;
              background-size: cover; }
        .glass-sidebar { background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(4px); }
        .glass-main { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }

        /* --- STYLES OVERLAY --- */
        .overlay-modal { position: fixed; inset: 0; display: grid; place-items: center; z-index: 1200; }
        .overlay-modal[hidden] { display: none; }
        .overlay-backdrop { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.66); backdrop-filter: blur(3px); }
        .overlay-panel {
            position: relative; width: min(900px, calc(100vw - 32px)); max-height: calc(100vh - 48px);
            overflow: auto; border-radius: 20px; padding: 20px; background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 24px 55px rgba(2, 6, 23, 0.35); border: 1px solid rgba(148, 163, 184, 0.25);
        }
        .overlay-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .overlay-title { margin: 0; font-size: 22px; color: #0f172a; }
        .overlay-close { border: none; width: 36px; height: 36px; border-radius: 999px; background: #e2e8f0; color: #0f172a; font-size: 18px; cursor: pointer; }
        .overlay-close:hover { background: #cbd5e1; }
        .role-chip { display: inline-block; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; color: #065f46; background: #d1fae5; }
        .role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 14px; }
        .role-item { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 12px; padding: 12px; }
        .role-item h4 { margin: 0 0 6px; font-size: 14px; color: #0f172a; }
    </style>
</head>
<body class="flex">
    <aside class="w-64 glass-sidebar min-h-screen text-gray-300 p-6 flex flex-col gap-6 shadow-2xl">
    <div class="text-2xl font-bold flex items-center gap-2 text-white">
        <img src="Sans%20titre-2.png" alt="IntelliBuild" class="h-10 w-10 rounded-full object-contain">
        <span>IntelliBuild</span>
    </div>
    
    <select class="lang w-full bg-gray-800 text-gray-200 rounded-lg p-2 text-sm">
        <option value="fr">FR</option>
        <option value="en">EN</option>
        <option value="ar">AR</option>
    </select>

    <nav class="flex flex-col gap-4 mt-10">
        <a href="index.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
            <i class="fas fa-home"></i> <span data-key="nav_dashboard">Dashboard</span>
        </a>
        <a href="ajouter-objet.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
            <i class="fas fa-plus"></i> <span data-key="nav_add">Ajouter</span>
        </a>
        <a href="objets.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
            <i class="fas fa-cube"></i> <span data-key="nav_objects">Objets</span>
        </a>
        <a href="localisations.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
            <i class="fas fa-map-marker-alt"></i> <span data-key="nav_locations">Localisations</span>
        </a>
        
        <a href="#" id="openHistoryOverlay" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
            <i class="fas fa-clock-rotate-left"></i> <span data-key="nav_history">Historique</span>
        </a>
        <a href="#" id="openRoleOverlay" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
            <i class="fas fa-user-shield"></i> <span data-key="nav_role">Role</span>
        </a>

        <a href="parametres.html" class="bg-emerald-700 p-3 rounded-lg flex items-center gap-3 text-white shadow-lg mt-auto">
            <i class="fas fa-cog"></i> <span data-key="nav_settings">Paramètres</span>
        </a>
    </nav>
</aside>

    <main class="flex-1 p-8">
        <div class="glass-main p-8 rounded-3xl shadow-2xl max-w-2xl mx-auto">
            <h2 class="text-3xl font-bold text-gray-800 mb-8"><i class="fas fa-user-cog text-emerald-600 mr-2"></i> <span data-key="account_title">Mon Compte</span></h2>
            
            <div class="space-y-6">
                <div class="flex items-center justify-between p-4 bg-white/50 rounded-2xl border border-gray-200">
                    <div>
                        <p class="font-bold text-gray-800" data-key="session_admin">Session Admin</p>
                        <p class="text-sm text-gray-500" data-key="session_desc">Connecté en tant que gestionnaire</p>
                    </div>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-xl transition shadow-lg">
                        <i class="fas fa-sign-out-alt mr-2"></i> <span data-key="logout">Déconnexion</span>
                    </button>
                </div>

                <div class="p-6 bg-emerald-50 rounded-2xl border border-emerald-100 text-emerald-800">
                    <h4 class="font-bold mb-2" data-key="server_status">Statut du Serveur</h4>
                    <p class="text-sm flex items-center gap-2">
                        <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span data-key="server_ok">Backend MongoDB : Opérationnel</span>
                    </p>
                </div>
            </div>
        </div>

        <footer class="glass-main mt-8 p-3 rounded-2xl flex items-center justify-between text-[11px] text-gray-700">
            <div class="flex items-center gap-2 font-semibold text-gray-800">
                <img src="Sans%20titre-2.png" alt="IntelliBuild" class="h-6 w-6 rounded-full object-contain">
                <span>IntelliBuild</span>
            </div>
            <div>(c) 2026 IntelliBuild. All rights reserved.</div>
        </footer>
    </main>

    <div class="overlay-modal" id="infoOverlay" hidden>
        <div class="overlay-backdrop" id="overlayBackdrop"></div>
        <div class="overlay-panel">
            <div class="overlay-header">
                <h3 class="overlay-title" id="overlayTitle">Détails</h3>
                <button class="overlay-close" id="overlayClose">x</button>
            </div>
            <div class="overlay-body" id="overlayBody"></div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script>
        // --- GESTION DES OVERLAYS ---
        const infoOverlay = document.getElementById('infoOverlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayBody = document.getElementById('overlayBody');

        function tr(key, fallback) {
            const locale = (localStorage.getItem('lang') || 'fr').toLowerCase();
            return (window.translations && translations[locale] && translations[locale][key]) || fallback;
        }

        function openOverlay(title, content) {
            overlayTitle.textContent = title;
            overlayBody.innerHTML = content;
            infoOverlay.hidden = false;
            document.body.style.overflow = 'hidden';
        }

        function closeOverlay() {
            infoOverlay.hidden = true;
            document.body.style.overflow = '';
        }

        document.getElementById('openHistoryOverlay').onclick = (e) => {
            e.preventDefault();
            const raw = localStorage.getItem('adminHistory');
            const history = raw ? JSON.parse(raw) : [];
            const rows = history.map(item => `
                <tr class="border-b border-gray-100">
                    <td class="p-3 text-sm text-gray-600">${item.date || '-'}</td>
                    <td class="p-3 text-sm font-bold text-gray-700">${item.action || '-'}</td>
                    <td class="p-3 text-sm text-gray-500">${item.detail || '-'}</td>
                </tr>`).join('');
            openOverlay(tr('nav_history', 'Historique'), `<table class="w-full text-left"><tbody>${rows || '<tr><td class="p-4 text-center">Aucun historique</td></tr>'}</tbody></table>`);
        };

        document.getElementById('openRoleOverlay').onclick = (e) => {
            e.preventDefault();
            openOverlay(tr('nav_role', 'Rôle'), `<div class="p-2"><span class="role-chip">Admin</span><div class="role-grid"><div class="role-item"><h4>Privilèges</h4><p class="text-sm text-gray-600">Accès total au système IntelliBuild.</p></div></div></div>`);
        };

        document.getElementById('overlayClose').onclick = closeOverlay;
        document.getElementById('overlayBackdrop').onclick = closeOverlay;

        // --- FONCTIONS EXISTANTES ---
        function logout() {
            localStorage.removeItem('userToken');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
