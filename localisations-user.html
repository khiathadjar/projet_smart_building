<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBuild - Architecture 3D Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-overlay: rgba(15, 23, 42, 0.48);
            --sidebar-bg: rgba(0, 0, 0, 0.92);
            --text-light: #ffffff;
            --hover-bg: rgba(16, 185, 129, 0.18);
        }

        body { 
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                url("https://images.pexels.com/photos/4040649/pexels-photo-4040649.jpeg") no-repeat center center fixed;
            background-size: cover; 
            min-height: 100vh;
        }

        /* --- STYLES SIDEBAR (COPIÉS DE USER.HTML) --- */
        .sidebar {
            width: 280px; background: var(--sidebar-bg); color: var(--text-light);
            padding: 24px; display: flex; flex-direction: column; justify-content: space-between; 
            min-height: 100vh; position: fixed; z-index: 50;
        }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .logo img { width: 40px; }
        .sidebar nav a {
            display: block; padding: 13px 14px; margin: 10px 0; text-decoration: none; color: var(--text-light);
            border-radius: 10px; transition: background 0.25s ease; cursor: pointer;
        }
        .sidebar nav a:hover, .sidebar nav .nav-active { background: var(--hover-bg); }
        .sidebar nav .nav-active { box-shadow: inset 0 0 0 1px rgba(52, 211, 153, 0.45); background: var(--hover-bg); }
        
        /* --- PROFIL DROPDOWN --- */
        .avatar {
            width: 52px; height: 52px; background: #1f9d55; color: var(--text-light);
            border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; border: none;
        }
        .dropdown {
            display: none; position: absolute; right: 0; top: 60px; background: rgba(255, 255, 255, 0.96);
            padding: 15px; border-radius: 15px; width: 200px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); z-index: 100;
        }
        .dropdown.open { display: block; }
        .dropdown a { display: block; padding: 10px; text-decoration: none; color: #0f172a; border-radius: 8px; }
        .dropdown a:hover { background: #e8fce9; }

        /* --- 3D CANVAS & CARDS --- */
        .floor-card { 
            background: rgba(255, 255, 255, 0.95); border-radius: 30px;
            overflow: hidden; border-left: 8px solid #10b981;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; height: 550px; margin-bottom: 2rem;
        }
        .canvas-container { flex-grow: 1; position: relative; cursor: grab; background: radial-gradient(circle, #ffffff 0%, #cbd5e1 100%); }
        .room-tag {
            position: absolute; background: #1e293b; color: #f8fafc; padding: 4px 12px;
            border-radius: 8px; font-size: 11px; font-weight: 800; pointer-events: none;
            text-transform: uppercase; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); transform: translate(-50%, -100%); z-index: 10;
        }

        /* --- OVERLAYS --- */
        .overlay-modal { position: fixed; inset: 0; display: grid; place-items: center; z-index: 1200; }
        .overlay-modal[hidden] { display: none; }
        .overlay-backdrop { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.66); backdrop-filter: blur(3px); }
        .overlay-panel {
            position: relative; width: min(900px, calc(100vw - 32px)); max-height: calc(100vh - 48px);
            overflow: auto; border-radius: 20px; padding: 20px; background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 24px 55px rgba(2, 6, 23, 0.35); border: 1px solid rgba(148, 163, 184, 0.25);
        }
    </style>
</head>
<body class="flex">

    <aside class="sidebar">
        <div>
            <div class="logo">
                <img src="Sans%20titre-2.png" alt="Logo IntelliBuild">
                <h2 class="text-xl font-bold" data-key="brand">IntelliBuild</h2>
            </div>
            <nav id="sideNav">
                <a href="user.html" data-key="nav_dashboard">Dashboard</a>
                <a href="user.html#objectsSection" data-key="nav_objects">Objets</a>
                <a href="localisations-user.html" class="nav-active" data-key="nav_locations">Localisations</a>
                <a href="#" id="openHistoryOverlay" data-key="nav_history">Historique</a>
                <a href="#" id="openRoleOverlay" data-key="nav_role">Role</a>
                <a href="parametres-user.html" data-key="nav_settings">Paramètres</a>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <div class="bg-white/10 p-4 rounded-xl">
                <div class="text-xs font-bold mb-2 uppercase opacity-60" data-key="lang_title">Langue</div>
                <select id="langSelect" class="w-full bg-slate-900 border border-white/20 rounded-lg p-2 text-sm text-white">
                    <option value="fr">FR</option>
                    <option value="en">EN</option>
                    <option value="ar">AR</option>
                </select>
            </div>
        </div>
    </aside>

    <div class="flex-1 ml-[280px]">
        <header class="sticky top-0 z-40 px-8 py-4 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-gray-200">
            <div id="currentPos" class="bg-emerald-600 text-white px-5 py-2 rounded-full font-bold shadow-md">
                <i class="fas fa-street-view mr-2"></i> Ma Position : <span id="posName">Chargement...</span>
            </div>

            <div class="relative">
                <button class="avatar" id="profileButton">A</button>
                <div class="dropdown" id="menu">
                    <strong id="menuName" class="block mb-2 text-gray-800">Utilisateur</strong>
                    <hr class="mb-2">
                    <a href="#" id="openProfileOverlay" data-key="menu_profile">Mon profil</a>
                    <a href="#" id="logoutLink" class="text-red-600" data-key="logout">Déconnexion</a>
                </div>
            </div>
        </header>

        <main class="p-8">
            <div class="mb-10 text-center">
                <h1 class="text-5xl font-black text-white mb-2 drop-shadow-lg">Architecture Interactive</h1>
                <p class="text-emerald-50 text-lg font-medium">Cliquez sur un bureau pour mettre à jour votre localisation.</p>
            </div>
            <div id="floorContainer" class="grid grid-cols-1 gap-12 max-w-5xl mx-auto"></div>
        </main>
    </div>

    <div class="overlay-modal" id="infoOverlay" hidden>
        <div class="overlay-backdrop" id="overlayBackdrop"></div>
        <div class="overlay-panel">
            <div class="overlay-header flex justify-between items-center mb-4">
                <h3 class="overlay-title font-bold text-xl" id="overlayTitle">Détails</h3>
                <button class="overlay-close bg-gray-200 hover:bg-gray-300 rounded-full w-8 h-8" id="overlayClose">x</button>
            </div>
            <div class="overlay-body" id="overlayBody"></div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script>
        // --- LOGIQUE COMMUNE (USER.HTML) ---
        const profileButton = document.getElementById("profileButton");
        const menu = document.getElementById("menu");
        const menuName = document.getElementById("menuName");
        const logoutLink = document.getElementById("logoutLink");
        const infoOverlay = document.getElementById('infoOverlay');
        const overlayBody = document.getElementById('overlayBody');
        const overlayTitle = document.getElementById('overlayTitle');

        const apiBase = "http://127.0.0.1:8000";
        const userToken = localStorage.getItem("userToken");

        if (!userToken) window.location.href = "login.html";

        function openOverlay(title, html) {
            overlayTitle.textContent = title;
            overlayBody.innerHTML = html;
            infoOverlay.hidden = false;
        }

        function closeOverlay() { infoOverlay.hidden = true; }

        profileButton.onclick = () => menu.classList.toggle("open");
        document.onclick = (e) => { if(!profileButton.contains(e.target) && !menu.contains(e.target)) menu.classList.remove("open"); };

        logoutLink.onclick = (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = "login.html";
        };

        // --- GESTION POSITION & 3D (TA LOGIQUE ORIGINALE) ---
        const ARCHI_DATA = [
            { id: 4, name: "Étage 4 - Direction", color: 0xef4444, rooms: ["Bureau PDG", "Salle Conseil", "Salon VIP", "Terrasse", "Secrétariat", "Archives Dir."] },
            { id: 3, name: "Étage 3 - Tech", color: 0x3b82f6, rooms: ["Open Space", "Labo Robotique", "Bureau Lead", "Réunion 3A", "Debug Zone", "Serveurs 3"] },
            { id: 2, name: "Étage 2 - Marketing", color: 0xa855f7, rooms: ["Studio Graph.", "Bureau RH", "Compta", "Presse", "Réunion 2B", "Bureau Com"] },
            { id: 1, name: "Étage 1 - Logistique", color: 0xf59e0b, rooms: ["Stockage", "Atelier", "Serveurs 1", "Sécurité", "Quai", "Bureau Chef"] },
            { id: 0, name: "RDC - Public", color: 0x10b981, rooms: ["Accueil", "Cafétéria", "Showroom", "Auditorium", "Sanitaires", "Détente"] }
        ];

        function setMyPos(room) {
            localStorage.setItem('user_room', room);
            document.getElementById('posName').textContent = room;
            alert("📍 Localisation mise à jour : " + room);
            location.reload();
        }

        function createFloor3D(containerId, rooms, floorColor) {
            const container = document.getElementById(containerId);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 1, 1000);
            camera.position.set(30, 25, 30);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            const clickableObjects = [];
            const labels = [];

            rooms.forEach((roomName, index) => {
                const group = new THREE.Group();
                const geometry = new THREE.BoxGeometry(8, 4, 8);
                const material = new THREE.MeshPhongMaterial({ color: floorColor, transparent: true, opacity: 0.7 });
                const cube = new THREE.Mesh(geometry, material);
                
                group.position.set((index % 3) * 12 - 12, 0, Math.floor(index / 3) * 12 - 6);
                group.add(cube);
                group.userData = { name: roomName };
                scene.add(group);
                clickableObjects.push(cube);

                const label = document.createElement('div');
                label.className = 'room-tag';
                label.textContent = roomName;
                container.appendChild(label);
                labels.push({ element: label, position: group.position });
            });

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            renderer.domElement.addEventListener('click', (event) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
                mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(clickableObjects);
                if (intersects.length > 0) setMyPos(intersects[0].object.parent.userData.name);
            });

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                labels.forEach(l => {
                    const vector = l.position.clone().project(camera);
                    l.element.style.left = `${(vector.x * 0.5 + 0.5) * container.clientWidth}px`;
                    l.element.style.top = `${(vector.y * -0.5 + 0.5) * container.clientHeight}px`;
                });
                renderer.render(scene, camera);
            }
            animate();
        }

        function init() {
            const container = document.getElementById('floorContainer');
            container.innerHTML = ARCHI_DATA.map(floor => `
                <div class="floor-card">
                    <div class="px-8 py-4 bg-white border-b flex justify-between items-center">
                        <h2 class="text-2xl font-black text-gray-800 uppercase italic">${floor.name}</h2>
                    </div>
                    <div id="canvas-${floor.id}" class="canvas-container"></div>
                </div>
            `).join('');
            ARCHI_DATA.forEach(f => createFloor3D(`canvas-${f.id}`, f.rooms, f.color));
            document.getElementById('posName').textContent = localStorage.getItem('user_room') || "Non définie";
            
            // Simulation profil (comme dans user.html)
            const email = localStorage.getItem("userEmail") || "Utilisateur";
            menuName.textContent = email.split('@')[0];
            profileButton.textContent = menuName.textContent[0].toUpperCase();
        }

        window.onload = init;
        document.getElementById('overlayClose').onclick = closeOverlay;
        document.getElementById('overlayBackdrop').onclick = closeOverlay;

        // Overlay Role & History (Statiques pour l'instant)
        document.getElementById('openRoleOverlay').onclick = (e) => { e.preventDefault(); openOverlay("Mon Rôle", "<p class='p-4'>Vous êtes connecté en tant qu'<strong>Utilisateur</strong>.</p>"); };
        document.getElementById('openHistoryOverlay').onclick = (e) => { e.preventDefault(); openOverlay("Historique", "<p class='p-4'>Aucune action récente enregistrée.</p>"); };
    </script>
</body>
</html>
