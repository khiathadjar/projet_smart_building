<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="2280" viewBox="0 0 1900 2280">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Tahoma, sans-serif; fill: #0f172a; }
      .label { font: 16px 'Segoe UI', Tahoma, sans-serif; fill: #0f172a; }
      .label-bold { font: 700 17px 'Segoe UI', Tahoma, sans-serif; fill: #0f172a; }
      .msg { font: 15px 'Segoe UI', Tahoma, sans-serif; fill: #0f172a; }
      .small { font: 14px 'Segoe UI', Tahoma, sans-serif; fill: #1e293b; }
      .participant { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 8; ry: 8; }
      .frame { fill: #f8fbff; stroke: #334155; stroke-width: 2; }
      .frame-inner { fill: #fcfdff; stroke: #475569; stroke-width: 1.8; }
      .branch-empty { fill: #fff7d6; stroke: none; }
      .branch-nonempty { fill: #eef6ff; stroke: none; }
      .branch-loop { fill: #f5f3ff; stroke: none; }
      .branch-found { fill: #eafbf1; stroke: none; }
      .branch-fallback { fill: #fff1f2; stroke: none; }
      .tag { fill: #dbeafe; stroke: #1e3a8a; stroke-width: 1.4; }
      .lifeline { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 9 6; }
      .msg-line { stroke: #0f172a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .return-line { stroke: #334155; stroke-width: 2.1; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .divider { stroke: #475569; stroke-width: 1.5; }
      .empty-line { stroke: #0f172a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .empty-return { stroke: #1e293b; stroke-width: 2.1; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .activation { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.3; }
    </style>
  </defs>

  <rect x="0" y="0" width="1900" height="2280" fill="#fdfefe"/>
  <text x="950" y="38" text-anchor="middle" class="title">Diagramme de séquence - Recherche d'un objet</text>

  <!-- Actor -->
  <circle cx="240" cy="76" r="14" fill="none" stroke="#334155" stroke-width="2"/>
  <line x1="240" y1="90" x2="240" y2="122" stroke="#334155" stroke-width="2"/>
  <line x1="220" y1="102" x2="260" y2="102" stroke="#334155" stroke-width="2"/>
  <line x1="240" y1="122" x2="220" y2="148" stroke="#334155" stroke-width="2"/>
  <line x1="240" y1="122" x2="260" y2="148" stroke="#334155" stroke-width="2"/>
  <text x="240" y="170" text-anchor="middle" class="label-bold">Utilisateur</text>

  <!-- Participants -->
  <rect x="520" y="60" width="220" height="48" class="participant"/>
  <text x="630" y="90" text-anchor="middle" class="label-bold">Interface (UI)</text>

  <rect x="980" y="60" width="220" height="48" class="participant"/>
  <text x="1090" y="90" text-anchor="middle" class="label-bold">Système (Backend)</text>

  <rect x="1420" y="60" width="220" height="48" class="participant"/>
  <text x="1530" y="90" text-anchor="middle" class="label-bold">Base de données</text>

  <!-- Lifelines -->
  <line x1="240" y1="186" x2="240" y2="2230" class="lifeline"/>
  <line x1="630" y1="108" x2="630" y2="2230" class="lifeline"/>
  <line x1="1090" y1="108" x2="1090" y2="2230" class="lifeline"/>
  <line x1="1530" y1="108" x2="1530" y2="2230" class="lifeline"/>

  <!-- Initial messages -->
  <text x="435" y="136" text-anchor="middle" class="msg">SaisirRequeteRecherche(...)</text>
  <line x1="240" y1="146" x2="630" y2="146" class="msg-line"/>

  <text x="860" y="196" text-anchor="middle" class="msg">EnvoyerRequeteRecherche(...)</text>
  <line x1="630" y1="206" x2="1090" y2="206" class="msg-line"/>

  <text x="1200" y="255" class="msg">NettoyerRequete(...)</text>
  <path d="M 1090 266 L 1160 266 L 1160 300 L 1090 300" class="msg-line"/>

  <!-- Outer alt -->
  <rect x="90" y="320" width="1600" height="1900" class="frame"/>
  <rect x="100" y="350" width="1580" height="300" class="branch-empty"/>
  <rect x="100" y="710" width="1580" height="1490" class="branch-nonempty"/>
  <rect x="100" y="320" width="46" height="24" class="tag"/>
  <text x="123" y="337" text-anchor="middle" class="small">alt</text>
  <text x="165" y="338" class="label-bold">Requête vide</text>
  <line x1="90" y1="680" x2="1690" y2="680" class="divider"/>
  <rect x="100" y="668" width="54" height="24" class="tag"/>
  <text x="127" y="685" text-anchor="middle" class="small">else</text>
  <text x="172" y="686" class="label-bold">Requête non vide</text>

  <!-- Empty request branch -->
  <rect x="1084" y="390" width="12" height="244" class="activation"/>
  <rect x="1524" y="400" width="12" height="60" class="activation"/>
  <rect x="624" y="634" width="12" height="32" class="activation"/>
  <text x="1310" y="390" text-anchor="middle" class="msg">LireTousLesObjets(...)</text>
  <line x1="1090" y1="400" x2="1530" y2="400" class="empty-line"/>

  <text x="1310" y="450" text-anchor="middle" class="msg">ListeObjets</text>
  <line x1="1530" y1="460" x2="1090" y2="460" class="empty-return"/>

  <text x="1200" y="515" class="msg">CalculerProximite(...)</text>
  <path d="M 1090 526 L 1160 526 L 1160 560 L 1090 560" class="empty-line"/>

  <text x="1200" y="575" class="msg">ClasserResultats(...)</text>
  <path d="M 1090 586 L 1160 586 L 1160 620 L 1090 620" class="empty-line"/>

  <text x="860" y="624" text-anchor="middle" class="msg">RetournerResultats(...)</text>
  <line x1="1090" y1="634" x2="630" y2="634" class="empty-return"/>

  <text x="435" y="656" text-anchor="middle" class="msg">AfficherListeObjets()</text>
  <line x1="630" y1="666" x2="240" y2="666" class="empty-return"/>

  <!-- Non-empty request branch -->
  <rect x="1084" y="746" width="12" height="810" class="activation"/>
  <rect x="1524" y="1010" width="12" height="60" class="activation"/>
  <rect x="1524" y="1220" width="12" height="60" class="activation"/>
  <text x="1200" y="745" class="msg">NormaliserRequete(...)</text>
  <path d="M 1090 756 L 1160 756 L 1160 790 L 1090 790" class="msg-line"/>

  <text x="1200" y="805" class="msg">ExtraireMotsCles(...)</text>
  <path d="M 1090 816 L 1160 816 L 1160 850 L 1090 850" class="msg-line"/>

  <text x="1200" y="865" class="msg">AjouterSynonymes(...)</text>
  <path d="M 1090 876 L 1160 876 L 1160 910 L 1090 910" class="msg-line"/>

  <text x="1250" y="925" class="msg">DetecterStatutsCompatibles(...)</text>
  <path d="M 1090 936 L 1160 936 L 1160 970 L 1090 970" class="msg-line"/>

  <text x="1310" y="1000" text-anchor="middle" class="msg">RechercherDansKeywordIndex(...)</text>
  <line x1="1090" y1="1010" x2="1530" y2="1010" class="msg-line"/>

  <text x="1310" y="1060" text-anchor="middle" class="msg">DocumentsIndexes</text>
  <line x1="1530" y1="1070" x2="1090" y2="1070" class="return-line"/>

  <text x="1200" y="1125" class="msg">CalculerScoreIndex(...)</text>
  <path d="M 1090 1136 L 1160 1136 L 1160 1170 L 1090 1170" class="msg-line"/>

  <text x="1310" y="1210" text-anchor="middle" class="msg">RechercherObjetsCandidats(...)</text>
  <line x1="1090" y1="1220" x2="1530" y2="1220" class="msg-line"/>

  <text x="1310" y="1270" text-anchor="middle" class="msg">ListeObjetsCandidats</text>
  <line x1="1530" y1="1280" x2="1090" y2="1280" class="return-line"/>

  <!-- Loop -->
  <rect x="940" y="1310" width="300" height="200" class="frame-inner"/>
  <rect x="950" y="1340" width="280" height="155" class="branch-loop"/>
  <rect x="950" y="1310" width="58" height="24" class="tag"/>
  <text x="979" y="1327" text-anchor="middle" class="small">loop</text>
  <text x="1025" y="1328" class="label-bold">Pour chaque objet candidat</text>

  <text x="1185" y="1375" class="msg">VerifierCouvertureMotsCles(...)</text>
  <path d="M 1090 1386 L 1160 1386 L 1160 1420 L 1090 1420" class="msg-line"/>

  <text x="1200" y="1440" class="msg">CalculerScoreFlou(...)</text>
  <path d="M 1090 1451 L 1160 1451 L 1160 1485 L 1090 1485" class="msg-line"/>

  <text x="1225" y="1505" class="msg">CalculerScoreRecherche(...)</text>
  <path d="M 1090 1516 L 1160 1516 L 1160 1550 L 1090 1550" class="msg-line"/>

  <!-- Nested alt -->
  <rect x="300" y="1590" width="1390" height="630" class="frame-inner"/>
  <rect x="310" y="1620" width="1370" height="108" class="branch-found"/>
  <rect x="310" y="1770" width="1370" height="430" class="branch-fallback"/>
  <rect x="310" y="1590" width="46" height="24" class="tag"/>
  <text x="333" y="1607" text-anchor="middle" class="small">alt</text>
  <text x="375" y="1608" class="label-bold">Résultats pertinents trouvés</text>
  <line x1="300" y1="1748" x2="1690" y2="1748" class="divider"/>
  <rect x="310" y="1736" width="54" height="24" class="tag"/>
  <text x="337" y="1753" text-anchor="middle" class="small">else</text>
  <text x="382" y="1754" class="label-bold">Aucun résultat pertinent</text>

  <!-- Relevant results found -->
  <rect x="1084" y="1656" width="12" height="84" class="activation"/>
  <rect x="624" y="1708" width="12" height="32" class="activation"/>
  <text x="1200" y="1645" class="msg">CalculerProximite(...)</text>
  <path d="M 1090 1656 L 1160 1656 L 1160 1690 L 1090 1690" class="msg-line"/>

  <text x="1200" y="1705" class="msg">ClasserResultats(...)</text>
  <path d="M 1090 1716 L 1160 1716 L 1160 1740 L 1090 1740" class="msg-line"/>

  <text x="860" y="1698" text-anchor="middle" class="msg">RetournerResultatsClasses(...)</text>
  <line x1="1090" y1="1708" x2="630" y2="1708" class="return-line"/>

  <text x="435" y="1730" text-anchor="middle" class="msg">AfficherListeObjets()</text>
  <line x1="630" y1="1740" x2="240" y2="1740" class="return-line"/>

  <!-- No relevant results -->
  <rect x="1084" y="1810" width="12" height="290" class="activation"/>
  <rect x="1524" y="1810" width="12" height="60" class="activation"/>
  <rect x="624" y="2135" width="12" height="45" class="activation"/>
  <text x="1310" y="1800" text-anchor="middle" class="msg">LireObjetsPotentiels(...)</text>
  <line x1="1090" y1="1810" x2="1530" y2="1810" class="msg-line"/>

  <text x="1310" y="1860" text-anchor="middle" class="msg">ListeObjetsPotentiels</text>
  <line x1="1530" y1="1870" x2="1090" y2="1870" class="return-line"/>

  <text x="1220" y="1915" class="msg">RechercheFloueGlobale(...)</text>
  <path d="M 1090 1926 L 1160 1926 L 1160 1960 L 1090 1960" class="msg-line"/>

  <text x="1200" y="1985" class="msg">CalculerProximite(...)</text>
  <path d="M 1090 1996 L 1160 1996 L 1160 2030 L 1090 2030" class="msg-line"/>

  <text x="1200" y="2055" class="msg">ClasserResultats(...)</text>
  <path d="M 1090 2066 L 1160 2066 L 1160 2100 L 1090 2100" class="msg-line"/>

  <text x="860" y="2125" text-anchor="middle" class="msg">RetournerResultatsClasses(...)</text>
  <line x1="1090" y1="2135" x2="630" y2="2135" class="return-line"/>

  <text x="435" y="2170" text-anchor="middle" class="msg">AfficherListeObjets()</text>
  <line x1="630" y1="2180" x2="240" y2="2180" class="return-line"/>
</svg>
