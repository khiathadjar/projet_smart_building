<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBuild - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: url('https://images.pexels.com/photos/4040649/pexels-photo-4040649.jpeg') no-repeat center center fixed;
            background-size: cover; 
            min-height: 100vh;
            margin: 0;
        }
        .glass-sidebar { background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(4px); }
        .glass-main { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(10px); }
        .overlay-modal { position: fixed; inset: 0; display: grid; place-items: center; z-index: 1200; }
        .overlay-modal[hidden] { display: none; }
        .overlay-backdrop { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.66); backdrop-filter: blur(3px); }
        .overlay-panel {
            position: relative;
            width: min(900px, calc(100vw - 32px));
            max-height: calc(100vh - 48px);
            overflow: auto;
            border-radius: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 24px 55px rgba(2, 6, 23, 0.35);
            border: 1px solid rgba(148, 163, 184, 0.25);
        }
        .overlay-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .overlay-title { margin: 0; font-size: 22px; color: #0f172a; }
        .overlay-close {
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 999px;
            background: #e2e8f0;
            color: #0f172a;
            font-size: 18px;
            cursor: pointer;
        }
        .overlay-close:hover { background: #cbd5e1; }
        .role-chip {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: #065f46;
            background: #d1fae5;
        }
        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 14px;
        }
        .role-item {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            padding: 12px;
        }
        .role-item h4 { margin: 0 0 6px; font-size: 14px; color: #0f172a; }
        .role-item p { margin: 0; font-size: 13px; color: #334155; }
    </style>
</head>
<body class="flex">
    <script>
        if (!localStorage.getItem('userToken')) {
            window.location.href = "login.html";
        }
    </script>

    <aside class="w-64 glass-sidebar min-h-screen text-gray-300 p-6 flex flex-col gap-6 shadow-2xl">
        <div class="text-2xl font-bold flex items-center gap-2 text-white">
            <img src="Sans%20titre-2.png" alt="IntelliBuild" class="h-10 w-10 rounded-full object-contain">
            <span>IntelliBuild</span>
        </div>
        <select class="lang w-full bg-gray-800 text-gray-200 rounded-lg p-2 text-sm">
            <option value="fr">FR</option>
            <option value="en">EN</option>
            <option value="ar">AR</option>
        </select>
        <nav class="flex flex-col gap-4 mt-10">
            <a href="index.html" class="bg-emerald-700 p-3 rounded-lg flex items-center gap-3 text-white">
                <i class="fas fa-home"></i> <span data-key="nav_dashboard">Dashboard</span>
            </a>
            <a href="ajouter-objet.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-plus"></i> <span data-key="nav_add">Ajouter</span>
            </a>
            <a href="objets.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-cube"></i> <span data-key="nav_objects">Objets</span>
            </a>
            <a href="localisations.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-map-marker-alt"></i> <span data-key="nav_locations">Localisations</span>
            </a>
            <a href="#" id="openHistoryOverlay" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-clock-rotate-left"></i> <span data-key="nav_history">Historique</span>
            </a>
            <a href="#" id="openRoleOverlay" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-user-shield"></i> <span data-key="nav_role">Role</span>
            </a>
            <a href="parametres.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition mt-auto">
                <i class="fas fa-cog"></i> <span data-key="nav_settings">Paramètres</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <div class="flex justify-between items-center mb-8">
            <div class="relative w-1/2">
                <input type="text" id="mainSearch" placeholder="Rechercher un objet..." data-key="search_objects" data-attr="placeholder"
                       class="w-full p-2 pl-10 rounded-xl border-none shadow-sm bg-white/90 outline-none focus:ring-2 focus:ring-emerald-600">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
        </div>

        <section class="grid grid-cols-4 gap-6 mb-8">
            <div class="glass-main p-5 rounded-3xl shadow-xl border border-white/40">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs uppercase tracking-widest text-gray-500" data-key="stat_total">Total objets</p>
                        <p id="statTotal" class="text-3xl font-extrabold text-gray-800">0</p>
                    </div>
                    <div class="h-12 w-12 rounded-2xl bg-emerald-600/90 text-white flex items-center justify-center">
                        <i class="fas fa-layer-group"></i>
                    </div>
                </div>
                <div class="mt-4 h-1 rounded-full bg-emerald-200/80">
                    <div id="barTotal" class="h-1 rounded-full bg-emerald-600" style="width: 0%"></div>
                </div>
            </div>
            <div class="glass-main p-5 rounded-3xl shadow-xl border border-white/40">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs uppercase tracking-widest text-gray-500" data-key="stat_active">Actifs</p>
                        <p id="statActive" class="text-3xl font-extrabold text-emerald-700">0</p>
                    </div>
                    <div class="h-12 w-12 rounded-2xl bg-emerald-500 text-white flex items-center justify-center">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
                <div class="mt-4 h-1 rounded-full bg-emerald-100">
                    <div id="barActive" class="h-1 rounded-full bg-emerald-500" style="width: 0%"></div>
                </div>
            </div>
            <div class="glass-main p-5 rounded-3xl shadow-xl border border-white/40">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs uppercase tracking-widest text-gray-500" data-key="stat_inactive">Inactifs</p>
                        <p id="statInactive" class="text-3xl font-extrabold text-rose-700">0</p>
                    </div>
                    <div class="h-12 w-12 rounded-2xl bg-rose-500 text-white flex items-center justify-center">
                        <i class="fas fa-ban"></i>
                    </div>
                </div>
                <div class="mt-4 h-1 rounded-full bg-rose-100">
                    <div id="barInactive" class="h-1 rounded-full bg-rose-500" style="width: 0%"></div>
                </div>
            </div>
            <div class="glass-main p-5 rounded-3xl shadow-xl border border-white/40">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs uppercase tracking-widest text-gray-500" data-key="stat_locations">Localisations</p>
                        <p id="statLocations" class="text-3xl font-extrabold text-slate-800">0</p>
                    </div>
                    <div class="h-12 w-12 rounded-2xl bg-slate-700 text-white flex items-center justify-center">
                        <i class="fas fa-map-marked-alt"></i>
                    </div>
                </div>
                <p id="statLocationsHint" class="mt-3 text-xs text-gray-500" data-key="stat_locations_suffix">0 salles uniques</p>
            </div>
        </section>

        <div class="glass-main p-6 rounded-3xl shadow-2xl">
            <table class="w-full text-left">
                <thead class="text-gray-600 border-b border-gray-300">
                    <tr class="text-[11px] uppercase font-bold tracking-wider">
                        <th class="p-3 w-10"></th>
                        <th class="p-3" data-key="table_name">Nom</th>
                        <th class="p-3" data-key="table_type">Type</th>
                        <th class="p-3" data-key="table_location">Localisation</th>
                        <th class="p-3">Distance</th>
                        <th class="p-3" data-key="table_status">Statut</th>
                        <th class="p-3 w-12"></th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-gray-700 divide-y divide-gray-200"></tbody>
            </table>
        </div>

        <footer class="glass-main mt-8 p-3 rounded-2xl flex items-center justify-between text-[11px] text-gray-700">
            <div class="flex items-center gap-2 font-semibold text-gray-800">
                <img src="Sans%20titre-2.png" alt="IntelliBuild" class="h-6 w-6 rounded-full object-contain">
                <span>IntelliBuild</span>
            </div>
            <div>(c) 2026 IntelliBuild. All rights reserved.</div>
        </footer>
    </main>

    <div class="overlay-modal" id="infoOverlay" hidden aria-hidden="true">
        <div class="overlay-backdrop" id="overlayBackdrop"></div>
        <div class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
            <div class="overlay-header">
                <h3 class="overlay-title" id="overlayTitle">Details</h3>
                <button class="overlay-close" id="overlayClose" type="button" aria-label="Fermer">x</button>
            </div>
            <div class="overlay-body" id="overlayBody"></div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script>
        if (localStorage.getItem("userRole") !== "admin") {
            window.location.href = "user.html";
        }

        const apiBase = 'http://127.0.0.1:8000';
        const adminHistoryKey = 'adminHistory';
        const openHistoryOverlay = document.getElementById('openHistoryOverlay');
        const openRoleOverlay = document.getElementById('openRoleOverlay');
        const infoOverlay = document.getElementById('infoOverlay');
        const overlayBackdrop = document.getElementById('overlayBackdrop');
        const overlayClose = document.getElementById('overlayClose');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayBody = document.getElementById('overlayBody');

        function tr(key, fallback) {
            const locale = (localStorage.getItem('lang') || 'fr').toLowerCase();
            if (typeof translations !== 'undefined' && translations[locale] && translations[locale][key] !== undefined) {
                return translations[locale][key];
            }
            return fallback;
        }

        function openOverlay(title, htmlContent) {
            overlayTitle.textContent = title;
            overlayBody.innerHTML = htmlContent;
            infoOverlay.hidden = false;
            infoOverlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            overlayClose.focus();
        }

        function closeOverlay() {
            infoOverlay.hidden = true;
            infoOverlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        function readAdminHistory() {
            try {
                const raw = localStorage.getItem(adminHistoryKey);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function writeAdminHistory(entries) {
            localStorage.setItem(adminHistoryKey, JSON.stringify(entries.slice(0, 30)));
        }

        function addAdminHistory(action, detail, status) {
            const history = readAdminHistory();
            history.unshift({
                date: new Date().toLocaleString('fr-FR'),
                action,
                detail,
                status
            });
            writeAdminHistory(history);
        }

        function buildHistoryOverlayHtml() {
            const history = readAdminHistory();
            const rows = history.map(function (item) {
                const isSuccess = item.status === 'Succes';
                return `
                    <tr>
                        <td class="p-3 text-sm text-slate-600 whitespace-nowrap">${item.date || '-'}</td>
                        <td class="p-3 text-sm font-semibold text-slate-700">${item.action || '-'}</td>
                        <td class="p-3 text-sm">${item.detail || '-'}</td>
                        <td class="p-3 text-sm"><span class="px-3 py-1 rounded-full text-xs font-bold ${isSuccess ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-700'}">${item.status || '-'}</span></td>
                    </tr>
                `;
            }).join('');

            const empty = history.length ? '' : `<p class="text-slate-600 mt-2">${tr('history_empty', 'Aucune action pour le moment.')}</p>`;
            return `
                <div class="glass-main p-6 rounded-3xl shadow-2xl">
                    <h3 class="text-xl font-bold mb-4">${tr('history_overlay_title', 'Historique utilisateur')}</h3>
                    <table class="w-full text-left">
                        <thead class="text-gray-600 border-b border-gray-300">
                            <tr class="text-[11px] uppercase font-bold tracking-wider">
                                <th class="p-3">${tr('history_date', 'Date')}</th>
                                <th class="p-3">${tr('history_action', 'Action')}</th>
                                <th class="p-3">${tr('history_detail', 'Detail')}</th>
                                <th class="p-3">${tr('history_status', 'Statut')}</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">${rows}</tbody>
                    </table>
                    ${empty}
                </div>
            `;
        }

        function buildRoleOverlayHtml() {
            return `
                <div class="glass-main p-6 rounded-3xl shadow-2xl">
                    <h3 class="text-xl font-bold mb-4">${tr('role_overlay_title', 'Role utilisateur')}</h3>
                    <span class="role-chip">Admin</span>
                    <div class="role-grid">
                        <div class="role-item"><h4>Gestion objets</h4><p>Peut ajouter, modifier et supprimer les objets connectes.</p></div>
                        <div class="role-item"><h4>Supervision</h4><p>Peut consulter les localisations et les statistiques globales.</p></div>
                        <div class="role-item"><h4>Administration</h4><p>Peut gerer les parametres et les actions avancees.</p></div>
                    </div>
                </div>
            `;
        }

        function buildDetailOverlayHtml(details) {
            return `
                <div class="glass-main p-6 rounded-3xl shadow-2xl">
                    <h3 class="text-xl font-bold mb-4">${tr('detail_overlay_title', "Detail de l'objet")}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div class="bg-white/90 rounded-xl p-4 border border-slate-200"><p class="text-slate-500 font-semibold">${tr('detail_name', 'Nom')}</p><p class="font-bold text-slate-800 mt-1">${details.name || '-'}</p></div>
                        <div class="bg-white/90 rounded-xl p-4 border border-slate-200"><p class="text-slate-500 font-semibold">${tr('detail_type', 'Type')}</p><p class="font-bold text-slate-800 mt-1">${details.type || '-'}</p></div>
                        <div class="bg-white/90 rounded-xl p-4 border border-slate-200"><p class="text-slate-500 font-semibold">${tr('detail_location', 'Localisation')}</p><p class="font-bold text-slate-800 mt-1">${details.location || '-'}</p></div>
                        <div class="bg-white/90 rounded-xl p-4 border border-slate-200"><p class="text-slate-500 font-semibold">${tr('detail_status', 'Statut')}</p><p class="font-bold text-slate-800 mt-1">${details.status || '-'}</p></div>
                    </div>
                </div>
            `;
        }

        async function chargerObjets(query = "") {
            try {
                const user_room = localStorage.getItem('user_room') || '';
                const user_x = Number(localStorage.getItem('user_x') || 0);
                const user_y = Number(localStorage.getItem('user_y') || 0);
                const user_z = Number(localStorage.getItem('user_z') || 0);

                const response = await fetch(`${apiBase}/things/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        search_query: query,
                        user_room,
                        user_x,
                        user_y,
                        user_z
                    })
                });

                const items = await response.json();
                const tbody = document.getElementById('tableBody');

                const total = items.length;
                const active = items.filter(item => item.status === 'active' || item.status === 'Disponible').length;
                const inactive = Math.max(total - active, 0);
                const locationSet = new Set(items.map(item => item.location?.room || item.location || '').map(loc => String(loc).trim()).filter(Boolean));
                const locations = locationSet.size;

                document.getElementById('statTotal').textContent = total;
                document.getElementById('statActive').textContent = active;
                document.getElementById('statInactive').textContent = inactive;
                document.getElementById('statLocations').textContent = locations;
                const locale = (localStorage.getItem('lang') || 'fr').toLowerCase();
                const suffix = (window.translations && translations[locale] && translations[locale].stat_locations_suffix) || 'salles uniques';
                document.getElementById('statLocationsHint').textContent = `${locations} ${suffix}`;

                const safePercent = (value) => total ? Math.min(100, Math.round((value / total) * 100)) : 0;
                document.getElementById('barTotal').style.width = total ? '100%' : '0%';
                document.getElementById('barActive').style.width = `${safePercent(active)}%`;
                document.getElementById('barInactive').style.width = `${safePercent(inactive)}%`;

                addAdminHistory('Consultation', total + ' objets charges', 'Succes');

                tbody.innerHTML = items.map(item => {
                    const objectType = item["@type"] || item.type || "Objet Inconnu";
                    const itemName = item.name || 'Sans nom';
                    const itemLocation = item.location?.room || item.location || 'N/A';
                    const itemStatus = item.status || 'inconnu';
                    const distanceText = item.same_room ? "0m (MÊME SALLE)" : `${Math.round(Number(item.distance || 0))}m`;

                    return `
                    <tr class="object-row hover:bg-emerald-50/50 transition" tabindex="0" role="button"
                        data-name="${String(itemName).replace(/"/g, '&quot;')}"
                        data-type="${String(objectType).replace(/"/g, '&quot;')}"
                        data-location="${String(itemLocation).replace(/"/g, '&quot;')}"
                        data-status="${String(itemStatus).replace(/"/g, '&quot;')}">
                        <td class="p-3"><input type="checkbox" class="rounded"></td>
                        <td class="p-3 flex items-center gap-3 font-medium"><i class="fas fa-cube text-emerald-600"></i> ${itemName}</td>
                        <td class="p-3 text-sm">${objectType}</td>
                        <td class="p-3 text-sm">${itemLocation}</td>
                        <td class="p-3 text-sm font-semibold ${item.same_room ? 'text-emerald-700' : 'text-slate-700'}">${distanceText}</td>
                        <td class="p-3">
                            <span class="px-4 py-1 rounded-full text-xs font-bold ${item.status === 'active' || item.status === 'Disponible' ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-700'}">
                                ● ${itemStatus}
                            </span>
                        </td>
                        <td class="p-3 text-right">
                            <button onclick="deleteObjet('${item.id || ''}')" class="h-7 w-7 rounded-lg border border-rose-200 text-rose-600 hover:bg-rose-50" title="Supprimer">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                }).join('');
            } catch (error) {
                console.error("Erreur lors de la recherche:", error);
            }
        }

        async function deleteObjet(id) {
            if (!id) return;
            if (!confirm('Supprimer cet objet ?')) return;

            const token = localStorage.getItem("userToken");

            try {
                const response = await fetch(`${apiBase}/things/${encodeURIComponent(id)}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    alert(data.detail || 'Suppression impossible');
                    addAdminHistory('Suppression', 'Echec suppression objet ' + id, 'Echec');
                    return;
                }
                addAdminHistory('Suppression', 'Objet supprime: ' + id, 'Succes');
                chargerObjets(document.getElementById('mainSearch').value || '');
            } catch (error) {
                console.error('Erreur delete:', error);
                alert('Erreur lors de la suppression');
                addAdminHistory('Suppression', 'Erreur suppression objet ' + id, 'Echec');
            }
        }

        document.getElementById('mainSearch').addEventListener('input', (e) => {
            chargerObjets(e.target.value);
        });

        document.getElementById('tableBody').addEventListener('click', function (event) {
            const row = event.target.closest('.object-row');
            if (!row || event.target.closest('button') || event.target.closest('input[type="checkbox"]')) return;

            const details = {
                name: row.dataset.name,
                type: row.dataset.type,
                location: row.dataset.location,
                status: row.dataset.status
            };
            addAdminHistory('Objet', 'Consultation de ' + (details.name || '-'), 'Succes');
            openOverlay(tr('detail_overlay_title', "Detail de l'objet"), buildDetailOverlayHtml(details));
        });

        document.getElementById('tableBody').addEventListener('keydown', function (event) {
            if (event.key !== 'Enter' && event.key !== ' ') return;
            const row = event.target.closest('.object-row');
            if (!row) return;
            event.preventDefault();

            const details = {
                name: row.dataset.name,
                type: row.dataset.type,
                location: row.dataset.location,
                status: row.dataset.status
            };
            addAdminHistory('Objet', 'Consultation de ' + (details.name || '-'), 'Succes');
            openOverlay(tr('detail_overlay_title', "Detail de l'objet"), buildDetailOverlayHtml(details));
        });

        openHistoryOverlay.addEventListener('click', function (e) {
            e.preventDefault();
            openOverlay(tr('history_overlay_title', 'Historique utilisateur'), buildHistoryOverlayHtml());
        });

        openRoleOverlay.addEventListener('click', function (e) {
            e.preventDefault();
            openOverlay(tr('role_overlay_title', 'Role utilisateur'), buildRoleOverlayHtml());
        });

        overlayBackdrop.addEventListener('click', closeOverlay);
        overlayClose.addEventListener('click', closeOverlay);

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && !infoOverlay.hidden) closeOverlay();
        });

        window.onload = () => chargerObjets("");
    </script>
</body>
</html>
