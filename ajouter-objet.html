<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBuild - Ajouter un objet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: url('https://images.pexels.com/photos/4040649/pexels-photo-4040649.jpeg') no-repeat center center fixed;
            background-size: cover; 
            display: flex; 
            min-height: 100vh;
            margin: 0;
        }
        .glass-sidebar { background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(4px); }
        .form-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.3);
        }
        .overlay-modal { position: fixed; inset: 0; display: grid; place-items: center; z-index: 1200; }
        .overlay-modal[hidden] { display: none; }
        .overlay-backdrop { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.66); backdrop-filter: blur(3px); }
        .overlay-panel {
            position: relative;
            width: min(900px, calc(100vw - 32px));
            max-height: calc(100vh - 48px);
            overflow: auto;
            border-radius: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 24px 55px rgba(2, 6, 23, 0.35);
            border: 1px solid rgba(148, 163, 184, 0.25);
        }
        .overlay-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .overlay-title { margin: 0; font-size: 22px; color: #0f172a; }
        .overlay-close { border: none; width: 36px; height: 36px; border-radius: 999px; background: #e2e8f0; color: #0f172a; font-size: 18px; cursor: pointer; }
        .overlay-close:hover { background: #cbd5e1; }
        .role-chip { display: inline-block; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; color: #065f46; background: #d1fae5; }
        .role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 14px; }
        .role-item { background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 12px; padding: 12px; }
        .role-item h4 { margin: 0 0 6px; font-size: 14px; color: #0f172a; }
        .role-item p { margin: 0; font-size: 13px; color: #334155; }
        .glass-main { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex">
    <aside class="w-64 glass-sidebar min-h-screen text-gray-300 p-6 flex flex-col gap-6 shadow-2xl">
        <div class="text-2xl font-bold flex items-center gap-2 text-white">
            <img src="Sans%20titre-2.png" alt="IntelliBuild" class="h-10 w-10 rounded-full object-contain">
            <span>IntelliBuild</span>
        </div>
        <select class="lang w-full bg-gray-800 text-gray-200 rounded-lg p-2 text-sm">
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
        </select>
        <nav class="flex flex-col gap-4 mt-10">
            <a href="index.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-home"></i> <span data-key="nav_dashboard">Dashboard</span>
            </a>
            <a href="ajouter-objet.html" class="bg-emerald-700 p-3 rounded-lg flex items-center gap-3 text-white shadow-lg">
                <i class="fas fa-plus"></i> <span data-key="nav_add">Ajouter</span>
            </a>
            <a href="objets.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-cube"></i> <span data-key="nav_objects">Objets</span>
            </a>
            <a href="localisations.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-map-marker-alt"></i> <span data-key="nav_locations">Localisations</span>
            </a>
            <a href="#" id="openHistoryOverlay" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-clock-rotate-left"></i> <span data-key="nav_history">Historique</span>
            </a>
            <a href="#" id="openRoleOverlay" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition">
                <i class="fas fa-user-shield"></i> <span data-key="nav_role">Role</span>
            </a>
            <a href="parametres.html" class="p-3 hover:bg-gray-800 rounded-lg flex items-center gap-3 transition mt-auto">
                <i class="fas fa-cog"></i> <span data-key="nav_settings">Paramètres</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col p-6">
        <div class="flex-1 flex items-center justify-center">
            <div class="form-card p-10 w-full max-w-lg">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-800" data-key="add_object_title">Ajouter un objet</h2>
                    <p class="text-gray-500" data-key="add_object_sub">Remplissez les informations de l'appareil</p>
                </div>
                <form id="addForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1" data-key="add_object_name">Nom de l'objet</label>
                        <input type="text" id="objName" placeholder="Ex: Lampe Bureau..." data-key="ph_object_name" data-attr="placeholder" required class="w-full p-3 rounded-xl border border-gray-300 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1" data-key="add_object_type">Type</label>
                            <select id="objType" class="w-full p-3 rounded-xl border border-gray-300 bg-white">
                                <option>Lampe</option>
                                <option>Imprimante</option>
                                <option>Projecteur</option>
                                <option>Capteur</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1" data-key="add_object_location">Localisation</label>
                            <input type="text" id="objLoc" placeholder="Bureau 101" data-key="ph_object_location" data-attr="placeholder" required class="w-full p-3 rounded-xl border border-gray-300 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1" data-key="add_object_description">Description</label>
                        <textarea id="objDesc" rows="3" class="w-full p-3 rounded-xl border border-gray-300 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1" data-key="add_object_status">Statut</label>
                        <select id="objStatus" class="w-full p-3 rounded-xl border border-gray-300 bg-white">
                            <option value="active" data-key="status_available">Disponible</option>
                            <option value="inactive" data-key="status_offline">Hors-ligne</option>
                        </select>
                    </div>
                    <div class="flex gap-4 pt-4">
                        <button type="button" onclick="window.location.href='index.html'" class="flex-1 py-3 border rounded-xl" data-key="btn_cancel">Annuler</button>
                        <button type="submit" class="flex-1 py-3 bg-emerald-700 text-white font-bold rounded-xl shadow-lg" data-key="btn_save">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
        <footer class="mt-8 bg-white/80 backdrop-blur-md p-3 rounded-2xl shadow-lg flex items-center justify-between text-[11px] text-gray-700">
            <div class="flex items-center gap-2 font-semibold text-gray-800">
                <img src="Sans%20titre-2.png" alt="IntelliBuild" class="h-6 w-6 rounded-full object-contain">
                <span>IntelliBuild</span>
            </div>
            <div>(c) 2026 IntelliBuild. All rights reserved.</div>
        </footer>
    </main>

    <div class="overlay-modal" id="infoOverlay" hidden aria-hidden="true">
        <div class="overlay-backdrop" id="overlayBackdrop"></div>
        <div class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
            <div class="overlay-header">
                <h3 class="overlay-title" id="overlayTitle">Details</h3>
                <button class="overlay-close" id="overlayClose" type="button" aria-label="Fermer">x</button>
            </div>
            <div class="overlay-body" id="overlayBody"></div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script>
        const token = localStorage.getItem('userToken');
        if (!token) window.location.href = "login.html";

        const adminHistoryKey = 'adminHistory';
        const openHistoryOverlay = document.getElementById('openHistoryOverlay');
        const openRoleOverlay = document.getElementById('openRoleOverlay');
        const infoOverlay = document.getElementById('infoOverlay');
        const overlayBackdrop = document.getElementById('overlayBackdrop');
        const overlayClose = document.getElementById('overlayClose');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayBody = document.getElementById('overlayBody');

        function tr(key, fallback) {
            const locale = (localStorage.getItem('lang') || 'fr').toLowerCase();
            if (typeof translations !== 'undefined' && translations[locale] && translations[locale][key] !== undefined) {
                return translations[locale][key];
            }
            return fallback;
        }

        function openOverlay(title, htmlContent) {
            overlayTitle.textContent = title;
            overlayBody.innerHTML = htmlContent;
            infoOverlay.hidden = false;
            infoOverlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeOverlay() {
            infoOverlay.hidden = true;
            infoOverlay.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        function readAdminHistory() {
            try {
                const raw = localStorage.getItem(adminHistoryKey);
                return raw ? JSON.parse(raw) : [];
            } catch { return []; }
        }

        function buildHistoryOverlayHtml() {
            const history = readAdminHistory();
            const rows = history.map(item => `
                <tr>
                    <td class="p-3 text-sm text-slate-600">${item.date || '-'}</td>
                    <td class="p-3 text-sm font-semibold text-slate-700">${item.action || '-'}</td>
                    <td class="p-3 text-sm">${item.detail || '-'}</td>
                    <td class="p-3 text-sm"><span class="px-3 py-1 rounded-full text-xs font-bold ${item.status === 'Succes' ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-700'}">${item.status || '-'}</span></td>
                </tr>`).join('');
            return `<div class="glass-main p-6 rounded-3xl shadow-2xl">
                        <h3 class="text-xl font-bold mb-4">${tr('history_overlay_title', 'Historique')}</h3>
                        <div class="overflow-x-auto"><table class="w-full text-left"><tbody class="divide-y divide-gray-200">${rows}</tbody></table></div>
                    </div>`;
        }

        function buildRoleOverlayHtml() {
            return `<div class="glass-main p-6 rounded-3xl shadow-2xl">
                        <h3 class="text-xl font-bold mb-4">${tr('role_overlay_title', 'Role')}</h3>
                        <span class="role-chip">Admin</span>
                        <div class="role-grid">
                            <div class="role-item"><h4>Gestion objets</h4><p>Accès complet.</p></div>
                            <div class="role-item"><h4>Supervision</h4><p>Accès stats.</p></div>
                        </div>
                    </div>`;
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('objName').value,
                type: document.getElementById('objType').value,
                location: document.getElementById('objLoc').value,
                description: document.getElementById('objDesc').value,
                status: document.getElementById('objStatus').value
            };
            try {
                const response = await fetch('http://127.0.0.1:8000/things/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
                if (response.ok) { alert("Objet enregistré !"); window.location.href = "index.html"; }
                else { alert("Erreur serveur"); }
            } catch (error) { alert("Erreur de connexion."); }
        });

        openHistoryOverlay.addEventListener('click', (e) => { e.preventDefault(); openOverlay(tr('history_overlay_title', 'Historique'), buildHistoryOverlayHtml()); });
        openRoleOverlay.addEventListener('click', (e) => { e.preventDefault(); openOverlay(tr('role_overlay_title', 'Role'), buildRoleOverlayHtml()); });
        overlayBackdrop.addEventListener('click', closeOverlay);
        overlayClose.addEventListener('click', closeOverlay);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeOverlay(); });
    </script>
</body>
</html>
